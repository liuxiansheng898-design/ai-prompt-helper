<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 提示词助手</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-900 to-blue-900 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [prompt, setPrompt] = useState('');
      const [type, setType] = useState('image');
      const [style, setStyle] = useState('realistic');
      const [subject, setSubject] = useState('');

      const templates = {
        image: {
          realistic: (s) => `A high-quality photograph of ${s || '[SUBJECT]'}, professional lighting, 8K resolution, detailed texture, Canon EOS R5`,
          anime: (s) => `Anime style illustration of ${s || '[SUBJECT]'}, vibrant colors, detailed background, studio Ghibli inspired, Makoto Shinkai style`,
          cinematic: (s) => `Cinematic shot of ${s || '[SUBJECT]'}, dramatic lighting, film grain, 35mm camera effect, teal and orange color grading`
        },
        video: {
          realistic: (s) => `${s || '[ACTION]'} in realistic style, smooth camera movement, natural lighting, 4K, handheld camera feel`,
          anime: (s) => `${s || '[ACTION]'} in anime style, vibrant colors, dynamic movement, Japanese animation, Makoto Shinkai`,
          cinematic: (s) => `${s || '[ACTION]'} cinematic video, dramatic lighting, slow motion, film quality, epic score`
        }
      };

      const generatePrompt = () => {
        const template = templates[type]?.[style] || templates.image.realistic;
        setPrompt(template(subject));
      };

      const copyToClipboard = () => {
        navigator.clipboard.writeText(prompt);
        alert('已复制到剪贴板！');
      };

      return (
        <div className="max-w-2xl mx-auto p-8">
          <h1 className="text-4xl font-bold mb-8 text-center text-white">🐂 AI 提示词助手</h1>
          
          <div className="bg-white/10 rounded-xl p-6 backdrop-blur border border-white/20">
            <div className="mb-4">
              <label className="block text-white mb-2">主体/动作描述：</label>
              <input 
                type="text" 
                value={subject}
                onChange={(e) => setSubject(e.target.value)}
                placeholder="例如：a cute cat, a flying dragon..."
                className="w-full bg-white/20 rounded-lg px-4 py-3 text-white placeholder-white/50"
              />
            </div>

            <div className="flex gap-4 mb-6">
              <select 
                value={type}
                onChange={(e) => setType(e.target.value)}
                className="bg-white/20 rounded-lg px-4 py-2 text-white flex-1"
              >
                <option value="image">🖼️ 文生图</option>
                <option value="video">🎬 文生视频</option>
              </select>
              
              <select 
                value={style}
                onChange={(e) => setStyle(e.target.value)}
                className="bg-white/20 rounded-lg px-4 py-2 text-white flex-1"
              >
                <option value="realistic">📷 写实</option>
                <option value="anime">🎨 动漫</option>
                <option value="cinematic">🎥 电影感</option>
              </select>
            </div>

            <button 
              onClick={generatePrompt}
              className="w-full bg-gradient-to-r from-purple-500 to-pink-500 py-3 rounded-lg font-bold hover:opacity-90 transition"
            >
              ✨ 生成提示词
            </button>

            {prompt && (
              <div className="mt-6 p-4 bg-white/10 rounded-lg border border-white/20">
                <p className="text-sm text-gray-300 mb-2">生成的提示词：</p>
                <p className="text-lg text-white mb-4">{prompt}</p>
                <button 
                  onClick={copyToClipboard}
                  className="bg-green-500 px-4 py-2 rounded-lg text-white hover:bg-green-600"
                >
                  📋 复制
                </button>
              </div>
            )}
          </div>
          
          <p className="text-center text-white/50 mt-8">
            支持 Midjourney, Stable Diffusion, DALL-E, 可灵, 即梦等AI工具
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
